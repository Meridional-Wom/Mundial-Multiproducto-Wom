<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mundial Multiproducto WOM</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="app">

    <!-- INICIO -->
    <section id="inicio" class="screen active">

      <header class="hero-card">
        <img src="banner.png" alt="Mundial Multiproducto WOM" />
      </header>

      <section class="status-bar">
        <div>
          <span>📅</span>
          <p>Jornada <strong id="jornadaActual">1 de 7</strong></p>
        </div>

        <div>
          <span>⏰</span>
          <p>Cierre <strong id="contador">13:00</strong></p>
        </div>
      </section>

      <section class="challenge-grid">
        <article class="challenge-card">
          <span>🎯</span>
          <div>
            <small>Condición del día</small>
            <h2 id="condicionDia">1 WOMGO vendido</h2>
          </div>
        </article>

        <article class="challenge-card clickable" onclick="showSection('avance')">
          <span>📈</span>
          <div>
            <small>Meta del día</small>
            <h2>Ver avance</h2>
          </div>
          <b>›</b>
        </article>
      </section>

      <section class="fixture-card">
        <div class="fixture-header">
          <h2>⚽ Partidos de hoy</h2>
          <span id="fechaJornada">Hoy</span>
        </div>

        <div id="partidosHoy" class="fixture-list"></div>
      </section>

      <section class="main-actions">
        <button onclick="showSection('apuesta')" class="action-main">
          📝 Apostar ahora
          <small>Envía tus pronósticos</small>
        </button>

        <button onclick="generarReportePartidos()" class="action-share">
          📤 Compartir
          <small>Jornada del día</small>
        </button>
      </section>

    </section>

    <!-- APUESTA -->
    <section id="apuesta" class="screen">
      <header class="section-head">
        <button onclick="showSection('inicio')">←</button>
        <h1>⚽ Apuesta de Hoy</h1>
      </header>

      <section class="panel">
        <label>Tienda</label>
        <select id="tienda"></select>

        <label>Responsable</label>
        <input id="responsable" placeholder="Nombre responsable" />

        <div id="formPartidos"></div>

        <button class="full-btn" onclick="guardarApuesta()">Guardar apuesta</button>
      </section>
    </section>

    <!-- PRONÓSTICOS -->
    <section id="pronosticos" class="screen">
      <header class="section-head">
        <button onclick="showSection('inicio')">←</button>
        <h1>📢 Pronósticos</h1>
      </header>

      <section class="panel">
        <div id="tablaPronosticos"></div>
      </section>
    </section>

    <!-- MARCADOR -->
    <section id="marcador" class="screen">
      <header class="section-head">
        <button onclick="showSection('inicio')">←</button>
        <h1>🔥 Marcador</h1>
      </header>

      <section class="panel">
        <div id="marcadorTabla"></div>
      </section>
    </section>

    <!-- COPA PIZZA -->
    <section id="copa" class="screen">
      <header class="section-head">
        <button onclick="showSection('inicio')">←</button>
        <h1>🍕 Copa Pizza</h1>
      </header>

      <section class="panel">
        <div id="copaPizza"></div>
      </section>
    </section>

    <!-- AVANCE -->
    <section id="avance" class="screen">
      <header class="section-head">
        <button onclick="showSection('inicio')">←</button>
        <h1>📈 Avance del Día</h1>
      </header>

      <section class="panel">
        <div id="avanceDia"></div>
      </section>
    </section>

    <!-- ADMIN -->
    <section id="adminPanel" class="screen">
      <header class="section-head">
        <button onclick="showSection('inicio')">←</button>
        <h1>⚙️ Admin</h1>
      </header>

      <section class="panel">
        <label>URL Apps Script</label>
        <input id="apiUrl" placeholder="Pega aquí la URL del Apps Script" />

        <button class="full-btn" onclick="guardarApi()">Guardar conexión</button>
      </section>
    </section>

  </main>

  <!-- MENÚ INFERIOR -->
  <nav class="bottom-nav">
    <button onclick="showSection('inicio')">🏠<small>Inicio</small></button>
    <button onclick="showSection('apuesta')">⚽<small>Apuesta</small></button>
    <button onclick="showSection('pronosticos')">📢<small>Pronósticos</small></button>
    <button onclick="showSection('marcador')">🔥<small>Marcador</small></button>
    <button onclick="showSection('copa')">🍕<small>Copa</small></button>
    <button onclick="admin()">⚙️<small>Admin</small></button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
