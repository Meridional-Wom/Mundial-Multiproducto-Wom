<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial Multiproducto WOM</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<section id="inicio">

<div class="hero-banner">
<img src="banner.png" alt="Banner Mundial">
</div>

<div class="menu-grid">

<button onclick="mostrar('apuesta')" class="menu-btn">
⚽
<span>Apuesta de Hoy</span>
</button>

<button onclick="mostrar('pronosticos')" class="menu-btn">
📢
<span>Pronósticos</span>
</button>

<button onclick="mostrar('marcador')" class="menu-btn">
🔥
<span>Marcador</span>
</button>

<button onclick="mostrar('pizza')" class="menu-btn">
🍕
<span>Copa Pizza</span>
</button>

<button onclick="compartirPartidos()" class="menu-btn">
📤
<span>Compartir Partidos</span>
</button>

<button onclick="compartirMetas()" class="menu-btn">
📊
<span>Compartir Metas</span>
</button>

<button onclick="admin()" class="menu-btn admin">
⚙️
<span>Admin</span>
</button>

</div>

</section>

<section id="apuesta" class="pagina">

<button onclick="inicio()" class="volver">
← Volver al Inicio
</button>

<h2>Apuesta de Hoy</h2>

</section>

<section id="pronosticos" class="pagina">

<button onclick="inicio()" class="volver">
← Volver al Inicio
</button>

<h2>Pronósticos</h2>

</section>

<section id="marcador" class="pagina">

<button onclick="inicio()" class="volver">
← Volver al Inicio
</button>

<h2>Marcador</h2>

</section>

<section id="pizza" class="pagina">

<button onclick="inicio()" class="volver">
← Volver al Inicio
</button>

<h2>Copa Pizza</h2>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
